# Nginx reverse proxy for HeroPath.
# Copy to /etc/nginx/sites-available/heropath, symlink into sites-enabled,
# then run certbot (it will add the SSL/443 block automatically).
server {
    listen 80;
    server_name heropath.tuzzi.ai;

    # Allow large-ish payloads (avatars, etc.)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
