version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heropath
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  web:
    build: .
    command: npm run dev
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
volumes:
  db_data:
